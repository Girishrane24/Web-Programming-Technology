<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <title>Document</title>
</head>
<body>
    <div class="container mt-3">
        <button type="button"> normal button</button>
        <button class="btn" type="button">normal button</button>
        <button class="btn btn-primary">normal button</button>
        <button class="btn btn-danger">normal button</button>
        <hr>

        <!-- button outline classes  -->
        <button class="btn btn-primary btn-lg" type="button">normal button</button>
        <button class="btn btn-primary" type="button">normal button</button>
        <button class="btn btn-primary btn-sm" type="button">normal button</button>
        
    <hr>

        <!-- button having full width   -->
        <div class="d-grid">

            <button class="btn btn-primary" type="button">normal button</button>
        </div>

        <hr>
        <!-- spinner button  -->
        <span class="spinner-border"></span>
        <span class="spinner-border bg-warning"></span>
        <button type="button" class="btn btn-outline-danger">  
            <span class="spinner-border text-primary spinner-border-sm"></span>Loadong... please wait
        </button>
        <hr>

        <!-- grow button  -->
        <span class="spinner-grow"></span>
        <span class="spinner-grow text-danger"></span>
        <span class="spinner-border text-danger spinner-border-sm"></span>
        <button type="button" class="btn btn-outline-primary">
        <span class="spinner-grow text-danger spinner-grow-sm"></span>Loadong...
        </button>



    </div>



</body>
</html>
