<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
    background-color: orange;
    font-family: Arial, sans-serif;
    }

    h2 {
    margin-left: 10px;
    }

    .container {
    width: 300px;
    background-color: #169bd5;
    border: 4px solid black;
    border-radius: 20px;
    padding: 20px;
    margin: 20px;
    }

    label {
    display: block;
    font-size: 18px;
    margin-top: 10px;
    }

    input {
    width: 90%;
    padding: 5px;
    font-size: 18px;
    margin-top: 5px;
    border: 3px solid black;
    }

    .buttons {
    margin-top: 15px;
    }

    button {
    padding: 8px 12px;
    margin-right: 10px;
    font-size: 16px;
    border: 3px solid black;
    border-radius: 10px;
    cursor: pointer;
    background-color: white;
    }

    button:hover {
    background-color: lightgray;
    }

    p {
    font-size: 20px;
    margin-top: 20px;
    }
    </style>
</head>
<body>
    
    <form>
        <label> Enter first name : </label> <br>
        <input type="text" name = "num1" id="num1"> <br>
        <label>Enter second number  : </label> <br>
        <input type="text" name="num2" id="num2"> <br> <br><br>
        <button type="button" onclick="addition()">Addition</button>
        <button type="button" onclick="Subtraction()">Subtraction</button>
        <button type="button" onclick="Multiplication()">Multiplication</button>
        <button type="button" onclick="Division()">Division</button>
        <br><br><br>
        <p>Result : <span id="result">0</span></p>
    </form>

    <script>
        function addition() {
            let no1 = document.getElementById("num1").value;
            let no2 = document.getElementById("num2").value;
            document.getElementById("result").innerText=(parseInt(no1)  + parseInt(no2));
        }
        function Subtraction() {
            let no1 = document.getElementById("num1").value;
            let no2 = document.getElementById("num2").value;
            document.getElementById("result").innerText=(parseInt(no1) - parseInt(no2));
        }
        function Multiplication() {
            let no1 = document.getElementById("num1").value;
            let no2 = document.getElementById("num2").value;
            document.getElementById("result").innerText=(parseInt(no1)  * parseInt(no2));
        }
        function Division() {
            let no1 = document.getElementById("num1").value;
            let no2 = document.getElementById("num2").value;
            document.getElementById("result").innerText=(parseInt(no1)  / parseInt(no2));
        }

    </script>
</body>
</html>
