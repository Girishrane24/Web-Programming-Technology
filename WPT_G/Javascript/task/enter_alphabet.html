
<!-- Task1: using prompt enter single alphabet and identify it wether is consonent or vovels -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

    <script>
        let data = prompt("Enter your name","Girish");
        if (data.toUpperCase() === ("A" || "E" || "I" || "O" || "U")){
            document.write("This is Vowels");
        }
        else{
            document.write("This is Consonent");
        }

    </script>
</body>
</html>
