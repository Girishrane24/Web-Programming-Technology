
<!-- using prompt enter number and find it is even or odd number   -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        let data = prompt("Enter a number : ");
        if(data % 2 === 0){
            document.write("This is Even Number");
        }else{
            document.write("This is Odd number");
        }
    </script>

</body>
</html>
