<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>


    <script>
        let email = prompt("Enter mail ID : ");
        let result = "";
        if(email){
            let mail = email.toLocaleLowerCase().trim();
            if (email.endsWith("@gmail.com"))
            {
                result = "Gmail Provider";
            } else if(email.endsWith("@yahoo.com"))
            {
                result = "Yahoo Provider";
            } else if (email.endsWith("@hotmail.com")) {
                result = "Hotmail Provider";
            } else if (email.endsWith("@outlook.com")) {
                result = "Outlook Provider";
        
            }
            document.write(result);
        }
    
    
    </script>
</body>
</html>
