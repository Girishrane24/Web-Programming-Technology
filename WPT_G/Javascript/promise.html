<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>promise</title>
</head>
<body>
    

    <script>
        let mypromise = new Promise((resolve,reject)=>{
        let placed = true;
        if(placed){
            return resolve("I Placed In Company");
        }else{
            return reject("I Will Apply To next Company");
        }
        });

        mypromise.then((result)=>{
            console.log(result);

        }).catch((error)=>{
        console.log(error)
        })
        
        // new promise 

        let punchIn = new Promise((resolve)=>{
            let time = 9;
            setTimeout(()=>{
                if(time>=9){
                    resolve("you Reached On time");
                }
            },2000);
        });
        punchIn.then((result)=>{console.log(result)});

        // Login with promise
        function login(uid,upass){
            return new Promise((resolve,reject)=>{
                setTimeout(()=>{
                    if(uid === "admin" && upass === "admin123"){
                        resolve("Login Successfully.")
                    }else{
                        reject("Login Failed");
                    }
                },3000)
            })
        }

        login("admin","admin123").then((res)=>{console.log(res)}).catch((res)=>{console.log(res)});
        login("admin","admin13").then((res)=>{console.log(res)}).catch((res)=>{console.log(res)});
        

        // access online json data 

        fetch("https://jsonplaceholder.typicode.com/posts").then((res)=>{console.log(res.json())}).catch((err)=>{console.log(err)});

    </script>
</body>
</html>
