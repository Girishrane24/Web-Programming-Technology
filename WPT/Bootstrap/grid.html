<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <title>Document</title>
    <style>
        .myborder{
            border: 2px solid red;
        }
    </style>
</head>
<body>
    <div class="container mt-3">
        <div class="row">
            <div class="col-2 myborder">col-1</div>
            <div class="col-2 myborder">col-2</div>
            <div class="col-2 myborder">col-3</div>
            <div class="col-2 myborder">col-4</div>
            <div class="col-2 myborder">col-5</div>
            <div class="col-2 myborder">col-6</div>
            <div class="col-2 myborder">col-7</div>
        </div>
        <hr>
        <div class="row">
            <div class="col-4 myborder">col-1</div>
            <div class="col-4 myborder">col-2</div>
            <div class="col-2 myborder">col-3</div>
            <div class="col-2 myborder">col-4</div>
        </div>
        <hr>
        <h1>Responsive Grid</h1>
        <div class="row">
            <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6  myborder">col-1</div>
            <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6 myborder">col-2</div>
            <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6 myborder">col-3</div>
            <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6 myborder">col-4</div>
            <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6 myborder">col-3</div>
            <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6 myborder">col-4</div>
        </div>
    </div>
</body>
</html>
