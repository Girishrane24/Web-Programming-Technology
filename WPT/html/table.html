<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body bgcolor="pink">
    <h2>simple table</h2>

    <table border="">
        <thead>
            <tr>
                <th>Sr.no</th>
                <th>Name</th>
                <th>Post</th>
                <th>Sallary</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Azim</td>
                <td>Software Engineer</td>
                <td>95000</td>
            </tr>
            <tr>
                <td>1</td>
                <td>Azim</td>
                <td>Software Engineer</td>
                <td>95000</td>
            </tr>
            <tr>
                <td>1</td>
                <td>Azim</td>
                <td>Software Engineer</td>
                <td>95000</td>
            </tr>
        </tbody>

    </table>
    <h2>table with rowspan</h2>
<table border="" width="25%">
   <tr>
     <td rowspan="2">A</td><td>B</td><td>C</td>
   </tr>
   <tr>
    <td>D</td><td rowspan="2">E</td>
   </tr>
   <tr>
    <td>F</td><td>G</td>
   </tr>
</table>
    <h2>table with colspan</h2>
     
    <table border="" width="25%">
       <tr>
         <td colspan="2">A</td><td>B</td>
       </tr>
       <tr>
        <td>C</td><td>D</td><td>E</td>
       </tr>
       <tr>
        <td>F</td><th colspan="2">G</th>
       </tr>
    </table>
<h2>Table with rowspan and colspan</h2>

<table border="" width="25%">
   <tr>
    <td rowspan="2" colspan="2" bgcolor="red">A</td><td>B</td>
   </tr>
   <tr>
    <td>C</td>
   </tr>
   <tr>
    <td>D</td><td>E</td><td>F</td>
   </tr>
</table>

</body>

</html>
