<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>


    <script>
        // use of abs method 
        document.write(Math.abs(123.2), "<br>")
        // use of ceil method 
        document.write(Math.ceil(5.8), "<br>");
        document.write(Math.ceil(5.5), "<br>");
        document.write(Math.ceil(5.4), "<br>");
        document.write(Math.ceil(5.4), "<br><hr>");

        // use of ceil method 
        document.write(Math.floor(4.6), "<br>");
        document.write(Math.floor(4.9), "<br><hr>");
        // use of round
        document.write(Math.round(4.6), "<br>");
        document.write(Math.round(4.5), "<br>");
        document.write(Math.round(4.4), "<br><hr>");
        // use of randon
        document.write(Math.random(), "<br>");
        
       
    </script>
</body>

</html>
