<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .txtprop {
            color: blue;
            font-size: 25px;
            /* border-style: solid; */
            text-align: center;
            /* border-color: red; */
            /* border-width: 7px; */
            border: 10px solid red;
        }

        .boxModel {
            border: 5px solid;
            width: 100px;
            font-size: 40px;
            padding: 10px 20px 30px 40px;
            border-width: 10px 20px 30px 40px;
            margin: 10px;
        }

        .circle {
            border: 2px solid blue;
            width: 200px;
            height: 200px;
            text-align: center;
            border-radius: 50%;
            margin: auto;
            background-color: yellow;
            transition: transform 2s;
        }
        .circle:hover{
            background-color: red;
            transform: rotateZ(350deg);
        }
    </style>
</head>

<body>

    <div class="txtprop">
        Amaan
    </div>
    <div class="boxModel"> Shruti</div>

    <div class="circle">hello</div>

</body>

</html>
