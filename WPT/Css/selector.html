<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 1. element name selector  */
        b{
            color:red;
            font-size: 20px;
        }
        u{
            color: green;
            background-color: yellow;
        }
        /* 2. group seletor  */
        strong,a{
            color: brown;
            text-transform: uppercase;
        }
        /* 3. id selector  */
        #d4{
            background-color: aqua;
        }
        /* 4. class selector  */
        .cls1{
            text-align: center;
        }
        /* 5.universal selector  */
        *{
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body>
    
    <b>Raja</b> <br> <u>Rahul</u> <br>
    <strong>Aaditya</strong> <br>
    <a href="">Home</a>

  <div class="cls1">this is div-1</div>
  <div class="cls1">this is div-2</div>
  <div class="cls1">this is div-3</div>
  <div id="d4">this is div-4</div>
  <div>this is div-5</div>

</body>
</html>
