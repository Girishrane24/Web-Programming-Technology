<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <title>Document</title>
</head>
<body>
   <button type="button" id="d1">FadeOut</button>
   <button type="button" id="d2">FadeIn</button>
   <button type="button" id="d3">FadeToggle</button><br>
   <img id="img1" src="../Assets/images/dosa.jpg" alt="">
    
    <script>
        $(document).ready(function(){
          $("#d1").click(()=>{
            $("#img1").fadeOut(1000)
          });
          $("#d2").click(()=>{
            $("#img1").fadeIn(1000)
          });
        });
    </script>
</body>
</html>
