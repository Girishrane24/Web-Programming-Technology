<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <title>Document</title>
    <style>
        #img1 {
            position: relative;
            border-radius: 50%;
            border: 9px solid red;
        }
    </style>
</head>

<body>
   <button type="button" id="d1">click</button>
   <button type="button" id="d2">click</button>
    <img id="img1" src="../Assets/images/angry.jfif" alt="">
 <script>
    $(document).ready(function(){
        $("#d1").click(()=>{
            $("#img1").animate({"left":"300px","top":"300px"},1000);
        })
        $("#d2").click(()=>{
            $("#img1").animate({"left":"300px","top":"0px"},1000);
        })
     
    });
 </script>

</body>

</html>
